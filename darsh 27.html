<html lang="en">
<head>
<meta charset="UTF-8">
<title>Healthy Food</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background:blue ;
        font-family: ink free;
    }

    .poster {
        background: linear-gradient;
        width: 350px;
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 10px 20px ;
        text-align: center;
        color: #333;
    }

    .title {
        background: #4caf50;
        color: blue;
        font-size: 28px;
        padding: 10px;
        border-radius: 15px;
        margin-bottom: 15px;
        font-weight: bold;
    }

    ul {
        list-style: none;
        padding: 20px;
        margin: 20px;
        text-align: left;
    }

    li {
        background: #f8f5d7;
        margin: 8px 0;
        padding: 10px;
        border-radius: 10px;
        font-size: 16px;
       }

    .footer {
        margin-top: 15px;
        background:red;
        color: white;
        padding: 10px;
        border-radius: 15px;
        font-weight: bold;
    }
</style>
</head>

<body>

<div class="poster">
    <div class="title">Healthy Food!!</div>

    <ul>
        <li>🍎<i><b><u>Fresh Fruits</li>
        <li>🥦🥬<i><b><u>Green Vegetables</li>
        <li>🥛<i><b><u>Milk & Dairy</li>
        <li>🥜🌰<i><B><u>Nuts & Seeds</li>      
        <li>🍗<i><b><u>Lean Proteins</li>
        <li>🌾<i><b><u>Whole Grains</li>
    </ul>

    <div class="footer">Eat Well • Live Well!</div>
</div>

</body>
</html>
