<h1>Welcome to " Shoppers Stop 'Sports E.com' "

<div class="item">
<p>
<img src="https://i.pinimg.com/originals/aa/6d/c3/aa6dc372e01c626704b15f8c8198a677.jpg"height=200
width=250  Backetball=₹999></p>
<button onclick="addToCart('Basketball',999)">Add to Cart</button>

<div class="item">
<p>
<img src="https://tse2.mm.bing.net/th/id/OIP.xFxi6H5pBWVKLWtMLkMNywHaEO?cb=ucfimg2&pid=ImgDet&ucfimg=1&w=474&h=270&rs=1&o=7&rm=3"height="200" width="250" football=₹999></p>
<button onclick="addToCart('football',999)">Add to Cart</button>
</div>


<div class="cart">
    <h3>Shopping Cart</h3>
    <p id="cartList">Cart is empty</p>
    <h3>Total: $<span id="totalAmount">0</span></h3>
</botton>
</div>

<script>
let totalAmount = 0;
function addToCart(item, price) {
    let cart = document.getElementById("cartList");
    let total = document.getElementById("totalAmount");
    // Update cart items
    if (cart.innerHTML === "Cart is empty") {
        cart.innerHTML = item;
    } else {
        cart.innerHTML += ", " + item;
    }
    // Update total amount
    totalAmount += price;
    total.innerHTML = totalAmount;
}
</script>
