<!DOCTYPE html>
<html>
<head>
    <title>Rock, Paper, Scissors</title>
<style>
button1{background-color:red;padding:10px 20px;margin:20px;}
button2{background-color:blue;padding:10px 20px;margin:20px;}
button3{background-color:yellow;padding:10px 20px;margin:20px;}
</style>

</head>
<body>
    <h1>Rock, Paper, Scissors</h1>

    <button1 onclick="playGame('rock')">Rock</button><br>
    <button2 onclick="playGame('paper')">Paper</button><br>
    <button3 onclick="playGame('scissors')">Scissors</button><br>


    <p id="result"></p>

    <script>
        function playGame(userChoice) {
            const choices = ["rock", "paper", "scissors"];
            const computerChoice = choices[Math.floor(Math.random() * choices.length)];

            let result;

            if (userChoice === computerChoice) {
                result = "It's a draw!";
            } else if (
                (userChoice === "rock" && computerChoice === "scissors") ||
                (userChoice === "paper" && computerChoice === "rock") ||
                (userChoice === "scissors" && computerChoice === "paper")
            ) {
                result = "You win!";
            } else {
                result = "You lose!";
            }

            document.getElementById("result").innerText =
                `You chose ${userChoice}, Computer chose ${computerChoice}. ${result}`;
        }
    </script>
</body>
</html>
